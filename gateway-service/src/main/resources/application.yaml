server:
    port: 8080

spring:
    application:
        name: gateway-service
    cloud:
        gateway:
            routes:
                # 1. API Đăng nhập / Đăng ký (Public)
                - id: user-service-public
                  uri: lb://USER-SERVICE
                  predicates:
                      # Chỉ định đích danh 2 API public theo chuẩn mới
                      - Path=/api/v1/auth/login, /api/v1/auth/register

                # 2. API Cần xác thực (Protected)
                - id: user-service-protected
                  uri: lb://USER-SERVICE
                  predicates:
                      # Gom các API cần token của auth (me, logout) và toàn bộ các module đã chuẩn hóa
                      - Path=/api/v1/auth/me, /api/v1/auth/logout, /api/v1/categories/**, /api/v1/transactions/**, /api/v1/budgets/**, /api/v1/notifications/**, /api/v1/saving-goals/**, /api/v1/saving-transactions/**

                # 3. Route lấy dữ liệu JSON Swagger của User Service
                - id: openapi-user-service
                  uri: lb://USER-SERVICE
                  predicates:
                      - Path=/v3/api-docs/user-service
                  filters:
                      - RewritePath=/v3/api-docs/user-service, /v3/api-docs

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        hostname: localhost
        ip-address: 127.0.0.1
        prefer-ip-address: true

jwt:
    # Trùng khóa với user-service; đặt qua biến môi trường JWT_SECRET khi deploy
    secret: ${JWT_SECRET:ThisIsA_VeryLongSecretKey_ForJwtMoneyAi_ChangeMe123456}

springdoc:
    swagger-ui:
        urls:
            - name: User Service API
              url: /v3/api-docs/user-service
