# serivce name
spring.application.name=user-service
# port server
server.port=8081
# eureka server url
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/moneyai_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Redis connection
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.timeout=2000
spring.data.redis.password=${REDIS_PASSWORD:}
# JWT — dùng biến môi trường JWT_SECRET trên môi trường thật
jwt.secret=${JWT_SECRET:ThisIsA_VeryLongSecretKey_ForJwtMoneyAi_ChangeMe123456}
jwt.expiration=3600000
jwt.refresh-expiration=604800000
# CORS: danh sách origin phân tách bởi dấu phẩy (không dùng * với cookie)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://localhost:8080
# Cookie refresh token: bật true khi client dùng HTTPS
app.cookie.secure=false

